<!DOCTYPE html>
<html>
<head>
  <title>Phoenix Pro Terminal V3</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body { margin:0; display:flex; background:#0b0f14; color:white; font-family:Arial; }

    #left { width:320px; background:#111827; overflow:auto; height:100vh; }

    #main { flex:1; display:flex; flex-direction:column; }

    #chart { flex:1; }

    .box { padding:10px; border-bottom:1px solid #222; cursor:pointer; }

    .box:hover { background:#1f2937; }
  </style>
</head>

<body>

<div id="left">
  <h3>🔥 HOT</h3>
  <div id="hot"></div>

  <h3>📊 TRADES</h3>
  <div id="trades"></div>

  <h3>📦 ORDERBOOK</h3>
  <div id="book"></div>
</div>

<div id="main">
  <div id="chart"></div>
</div>

<script>

let selected = "BTCUSDT";

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout:{ background:{color:'#0b0f14'}, textColor:'white' }
});

const line = chart.addLineSeries();

function connect() {

    const ws = new WebSocket("wss://live-price-chart-backend.onrender.com/ws");

    ws.onopen = () => {
        ws.send(JSON.stringify({type:"subscribe", symbol:selected}));
    };

    ws.onmessage = (msg) => {

        const res = JSON.parse(msg.data);

        if(res.type === "hot") renderHot(res.data);

        if(res.type === "symbol") {

            const d = res.data.price;

            line.update({
                time: Math.floor(Date.now()/1000),
                value: d.price
            });

            renderTrades(d.trades);
            renderBook(d.orderbook);
        }
    };
}

function subscribe(sym){
    selected = sym;

    const ws = new WebSocket("wss://live-price-chart-backend.onrender.com/ws");

    ws.onopen = () => {
        ws.send(JSON.stringify({type:"subscribe", symbol:sym}));
    };
}

function renderHot(data){
    let el = document.getElementById("hot");
    el.innerHTML = "";

    data.forEach(t=>{
        let d = document.createElement("div");
        d.className="box";
        d.innerHTML = `${t.symbol} $${t.price}`;
        d.onclick = ()=>subscribe(t.symbol);
        el.appendChild(d);
    });
}

function renderTrades(trades){
    let el = document.getElementById("trades");
    el.innerHTML = "";

    (trades||[]).slice(-10).forEach(t=>{
        let d = document.createElement("div");
        d.innerHTML = `${t.side} ${t.price}`;
        el.appendChild(d);
    });
}

function renderBook(book){
    let el = document.getElementById("book");
    el.innerHTML = "";

    if(!book) return;

    el.innerHTML = `
    Bids: ${book.bids?.length || 0}<br>
    Asks: ${book.asks?.length || 0}
    `;
}

connect();

</script>

</body>
  </html>
