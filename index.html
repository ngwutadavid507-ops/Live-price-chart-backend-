<!DOCTYPE html>
<html>
<head>
  <title>Phoenix Futures Terminal</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: white;
      font-family: Arial;
      display: flex;
    }

    #left {
      width: 320px;
      background: #111827;
      height: 100vh;
      overflow: auto;
    }

    #main {
      flex: 1;
    }

    .token {
      padding: 10px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .token:hover {
      background: #1f2937;
    }

    #chart {
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="left">
  <h3>🔥 HOT</h3>
  <div id="hot"></div>
</div>

<div id="main">
  <div id="chart"></div>
</div>

<script>

let selected = "BTCUSDT";

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { background: { color: '#0b0f14' }, textColor: 'white' }
});

const series = chart.addLineSeries();

let ws;

function connect() {

    ws = new WebSocket("wss://live-price-chart-backend.onrender.com/ws");

    ws.onopen = () => {
        ws.send(JSON.stringify({
            type: "subscribe",
            symbol: selected
        }));
    };

    ws.onmessage = (msg) => {
        const res = JSON.parse(msg.data);

        if (res.type === "hot") {
            renderHot(res.data);
        }

        if (res.type === "symbol") {
            series.update({
                time: Math.floor(Date.now() / 1000),
                value: res.data.price
            });
        }
    };

    ws.onclose = () => setTimeout(connect, 2000);
}

function subscribe(symbol) {
    selected = symbol;

    ws.send(JSON.stringify({
        type: "subscribe",
        symbol
    }));
}

function renderHot(data) {
    const hot = document.getElementById("hot");
    hot.innerHTML = "";

    data.forEach(t => {
        const div = document.createElement("div");
        div.className = "token";
        div.innerHTML = `${t.symbol} $${t.price}`;

        div.onclick = () => subscribe(t.symbol);

        hot.appendChild(div);
    });
}

connect();

</script>

</body>
</html>
